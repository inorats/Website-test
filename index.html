<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Responsivt oppsett -->
  <title>Olav Haraldstads heimeside</title>
  <style>
    /* Grunnleggende stil: fjern standardmarg på body for å plassere header i øverste venstre hjørne */
    body {
      margin: 0;
      font-family: sans-serif;
      display: grid;
      grid-template-rows: auto 1fr auto; /* header, main, footer */
      min-height: 100vh; /* gjør at footer alltid er nederst om innholdet er lite */
    }
    /* Header: Plasserer sidetittelen */
    header {
      background-color: #f0f0f0; /* lys bakgrunn for kontrast */
      padding: 1em;
    }
    header h1 {
      margin: 0;
      font-size: 1.5em;
    }
    /* Hovedinnhold: bildet sentrert */
    main {
      padding: 1em;
      text-align: center;
    }
    main img {
      max-width: 100%; /* sikrer at bildet skaleres ned på små skjermer */
      height: auto;
    }
    /* Footer: Kontaktinformasjon i bunn */
    footer {
      background-color: #f0f0f0;
      padding: 1em;
      font-size: 0.9em;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      text-align: center;
    }
    footer p {
      margin: 0.5em;
    }
    footer a {
      color: blue;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Topptekst med nettsidens tittel -->
  <header>
    <h1>Olav Haraldstads heimeside</h1>
  </header>

  <!-- Hovedinnhold: bildet fra eksternt nettsted -->
  <main>
    <!-- Bruker full URL gitt i oppgaven, med alt-tekst for tilgjengelighet -->
    <img src="https://media.discordapp.net/attachments/1372574081379209297/1516794477229113414/TruthNuke.gif"
         alt="Animerte bokstaver som danner ordet 'TruthNuke'" width="587" height="540">
  </main>

  <!-- Kontaktinformasjon i footer -->
  <footer>
    <p>E-post: 
      <a href="mailto:Olav.haraldstad@gmail.com">Olav.haraldstad@gmail.com</a> 
      <!-- Alternativt: &#79;&#108;&#97;... for å obfuskere -->
    </p>
    <p>Telefon: 
      <a href="tel:+4740882807">+47 408 82 807</a>
    </p>
    <p>Adresse: The White House, 1600 Pennsylvania Avenue NW, Washington, DC 20500</p>
    <!-- OBS: Ovenfor adresse er ment som humor/trolling. -->
  </footer>

</body>
</html>
